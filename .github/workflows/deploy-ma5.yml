name: Deploy MA5 Site

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ma5-main
  cancel-in-progress: false

jobs:
  validate:
    name: Validate application
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Verify committed frontend assets
        run: |
          set -euo pipefail
          test -f frontend/dist/index.html
          test -n "$(find frontend/dist/assets -maxdepth 1 -type f -name '*.js' -print -quit)"
          test -n "$(find frontend/dist/assets -maxdepth 1 -type f -name '*.css' -print -quit)"
          git diff --exit-code -- frontend/dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python and deploy scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' PY_FILES < <(find . -maxdepth 3 -type f -name '*.py' -not -path './.venv/*' -not -path '*/__pycache__/*' -print0)
          test "${#PY_FILES[@]}" -gt 0
          python -m py_compile "${PY_FILES[@]}"
          bash -n deploy/deploy.sh
          bash -n deploy/rollback.sh

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MA5_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        shell: bash
        env:
          MA5_SSH_HOST: ${{ secrets.MA5_SSH_HOST }}
          MA5_SSH_PORT: ${{ secrets.MA5_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${MA5_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$MA5_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run deploy script on server
        shell: bash
        env:
          MA5_SSH_HOST: ${{ secrets.MA5_SSH_HOST }}
          MA5_SSH_PORT: ${{ secrets.MA5_SSH_PORT }}
          MA5_SSH_USER: ${{ secrets.MA5_SSH_USER }}
          MA5_DEPLOY_PATH: ${{ secrets.MA5_DEPLOY_PATH }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          set -euo pipefail
          PORT="${MA5_SSH_PORT:-22}"
          DEPLOY_PATH="${MA5_DEPLOY_PATH:-/root/MA5_site}"
          REMOTE_FMP_API_KEY="$(printf '%q' "${FMP_API_KEY:-}")"
          ssh -p "$PORT" -o StrictHostKeyChecking=yes "$MA5_SSH_USER@$MA5_SSH_HOST" "set -euo pipefail; DEPLOY_PATH='$DEPLOY_PATH'; echo '---REMOTE_DEPLOY_PATH---'; echo \"\$DEPLOY_PATH\"; test -d \"\$DEPLOY_PATH/.git\"; cd \"\$DEPLOY_PATH\"; echo '---REMOTE_BEFORE_PULL---'; pwd; ls -la; git pull --ff-only origin main; echo '---REMOTE_AFTER_PULL---'; git rev-parse --short HEAD; ls -la; test -f deploy/deploy.sh; FMP_API_KEY=${REMOTE_FMP_API_KEY} bash \"\$DEPLOY_PATH/deploy/deploy.sh\""

      - name: Post summary
        if: success()
        run: |
          {
            echo "### MA5 自动部署成功 ✅"
            echo "- 分支: main"
            echo "- 触发提交: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
